# 🎵 NiiGrando-Song - Configuração de Exemplo
# Copie este arquivo e dê o nome de application.yml e configure seu token

discord:
  # Token do seu bot Discord (obtenha em: https://discord.com/developers/applications)
  token: |"SEU TOKEN DE BOT"
  # Prefixo dos comandos (pode alterar se quiser)
  prefix: "!"

youtube:
  # Opcional: token de refresh do OAuth2, necessario apenas se alguns videos pedirem login.
  # Veja o README para instrucoes de como gerar.
  oauth-refresh-token: ""

spring:
  application:
    name: NiiGrando-Song

logging:
  level:
    root: INFO
    com.niigrando: DEBUG
    net.dv8tion: INFO

# Como obter o token do bot:
# 1. Acesse: https://discord.com/developers/applications
# 2. Crie uma nova aplicação
# 3. Vá para a seção "Bot"
# 4. Clique em "Add Bot" ou "Reset Token"
# 5. Copie o token e cole aqui
